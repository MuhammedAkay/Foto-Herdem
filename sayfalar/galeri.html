          <figure class="gallery-item featured">
            <img src="../assets/dis-cekim-10.jpg" alt="Düğün çiftinden özel bir an">

            </figure>
            <figure class="gallery-item">
              <img src="../assets/dis-cekim-9.jpg" alt="Romantik dış çekim">

                <strong>Zarif Dokunuşlar</strong>
                <span>Güzelliğinizi yansıtan özel kareler.</span>

              <img src="../assets/dis-cekim-5.jpg" alt="Albüm hazırlığı">
