<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="Foto Herdem ana sayfa">
        <span class="brand-mark">FH</span>
        <span>Foto Herdem</span>
      </a>
      <button class="nav-toggle" type="button" data-nav-toggle aria-label="Menüyü aç" aria-expanded="false">
        <span></span>
      </button>
      <ul class="nav-links" data-nav-links>
        <li><a href="index.html">Ana Sayfa</a></li>
        <li><a href="galeri.html">Galeri</a></li>
        <li><a href="albumler.html">Albümler</a></li>
        <li><a href="paketler.html">Paketler</a></li>
        <li><a href="iletisim.html">İletişim</a></li>
      </ul>
    </div>
  </header>
 
  <main>
    <section class="page-hero gallery">
      <div class="container hero-inner">
        <div class="hero-copy">
          <div class="eyebrow">Seçili Kareler</div>
          <h1>Galeri</h1>
          <p>
            Burada farklı çekimlerden derlenmiş örnek kareler yer alıyor. İstersen bu
            alanı kategori bazlı filtreli bir galeriye de çevirebiliriz.
          </p>
          <div class="breadcrumbs">
            <a href="index.html">Ana Sayfa</a> / Galeri
          </div>
        </div>
      </div>
    </section>
 
    <section class="section">
      <div class="container">
        <div class="gallery-grid">
          <figure class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80" alt="Düğün anı">
            <figcaption class="overlay">
              <strong>First look</strong>
              <span>Duyguyu en sade haliyle yakalayan kareler.</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1200&q=80" alt="Çift portresi">
            <figcaption class="overlay">
              <strong>Portre</strong>
              <span>Doğal pozlar, sade tonlar.</span>
            </figcaption>
          </figure>
          <figure class="gallery-item tall">
            <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=1200&q=80" alt="Romantik dış çekim">
            <figcaption class="overlay">
              <strong>Dış çekim</strong>
              <span>Altın saat ışığı ve geniş kompozisyon.</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img src="https://images.unsplash.com/photo-1502920917128-1aa500764ce7?auto=format&fit=crop&w=1200&q=80" alt="Albüm hazırlığı">
            <figcaption class="overlay">
              <strong>Hazırlık</strong>
              <span>Günün ritmini anlatan detaylar.</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img src="https://images.unsplash.com/photo-1529634806980-b5ee3e0004f8?auto=format&fit=crop&w=1200&q=80" alt="Düğün kutlaması">
            <figcaption class="overlay">
              <strong>Kutlama</strong>
              <span>Enerjiyi yüksek tutan anlar.</span>
            </figcaption>
          </figure>
          <figure class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1600&q=80" alt="Albüm detayları">
            <figcaption class="overlay">
              <strong>Albüm detayları</strong>
              <span>Tasarım ve baskı kalitesi.</span>
            </figcaption>
          </figure>
        </div>
      </div>
    </section>
  </main>
 
  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span data-year></span> Foto Herdem</div>
      <div class="footer-links">

    </div>
